<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>התחברות לרשת - אוניברסיטת אריאל</title>
    <style>
        body {
            font-family: 'Segoe UI', 'Alef', 'Arial', sans-serif;
            background-color: #f7f9fc;
            margin: 0;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        /* כותרת כחולה עליונה */
        .header {
            background-color: #0c1b3d;
            color: #fff;
            padding: 30px 20px;
            text-align: center;
            border-bottom: 4px solid #f8b91f;
        }
        .header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: bold;
        }

        .main-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            flex-grow: 1;
        }

        /* סגנון ללוגו */
        .logo {
            max-width: 180px;
            margin: 20px 0;
        }

        /* תיבת הודעת הסבר */
        .welcome-msg {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 95%;
            max-width: 500px;
            margin-bottom: 25px;
            border-right: 5px solid #0c1b3d;
            text-align: right;
        }
        .welcome-msg p {
            font-size: 1rem;
            line-height: 1.6;
            margin: 0;
            color: #444;
        }

        /* פאנל התחברות */
        .info-panel {
            background-color: #fff;
            padding: 35px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            width: 95%;
            max-width: 450px;
        }
        .login-title {
            color: #0c1b3d;
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 25px;
            text-align: center;
            font-weight: bold;
        }

        form {
            display: flex;
            flex-direction: column;
        }
        label {
            font-size: 0.95rem;
            margin-bottom: 7px;
            font-weight: bold;
            text-align: right;
        }
        input[type="text"], input[type="password"] {
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            width: 100%;
            box-sizing: border-box;
            background-color: #fafafa;
        }
        input:focus {
            border-color: #0c1b3d;
            outline: none;
            background-color: #fff;
            box-shadow: 0 0 5px rgba(12, 27, 61, 0.3);
        }

        /* הודעת שגיאה */
        .error-box {
            background-color: #f2dede;
            color: #a94442;
            border: 1px solid #ebccd1;
            padding: 12px;
            border-radius: 4px;
            font-size: 0.95rem;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            font-weight: bold;
        }

        /* כפתור */
        button {
            background-color: #0c1b3d;
            color: #fff;
            padding: 15px;
            border: none;
            border-radius: 4px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }
        button:hover {
            background-color: #08122a;
        }

        .copyright {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
        }
    </style>
</head>
